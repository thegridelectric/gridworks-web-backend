    gw1.leaf.ally.all.tanks.state: {}
    gw1.leaf.ally.buffer.only.state: {}
    gw1.local.control.all.tanks.state: {}
    gw1.local.control.buffer.only.state: {}
    gw1.local.control.standby.top.state: {}
