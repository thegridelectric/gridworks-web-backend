$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.electricity.works/formats/utc.seconds"

title: "utc.seconds"
description: |
  UTC timestamp expressed as whole seconds since the Unix epoch
  (1970-01-01T00:00:00Z). Value is restricted to the range
  2000-01-01T00:00:00Z through 3000-01-01T00:00:00Z.
  
type: integer
minimum: 946684800    # 2000-01-01T00:00:00Z
maximum: 32503680000  # 3000-01-01T00:00:00Z

examples:
  - 1609459200      # 2021-01-01T00:00:00Z

  - 1735689600      # 2025-01-01T00:00:00Z

counterexamples:
  - 0               # too early (1970)
  - 946684799       # before year 2000
  - 32503680001     # after year 3000
  - 1609459200.500  # not an integer

x-gridworks:
  owner: "gridworks-energy"
