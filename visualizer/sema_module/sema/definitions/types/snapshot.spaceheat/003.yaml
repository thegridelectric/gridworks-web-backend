$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.electricity.works/types/snapshot.spaceheat/003"

title: "snapshot.spaceheat"
type: object
description: >
  Point-in-time snapshot containing the latest known readings and machine states
  captured by a Spaceheat SCADA.

properties:
  FromGNodeAlias:
    $ref: "https://schemas.electricity.works/formats/left.right.dot"

  FromGNodeInstanceId:
    $ref: "https://schemas.electricity.works/formats/uuid4.str"

  SnapshotTimeUnixMs:
    $ref: "https://schemas.electricity.works/formats/utc.milliseconds"

  LatestReadingList:
    type: array
    items:
      $ref: "https://schemas.electricity.works/types/single.reading/000"

  LatestStateList:
    type: array
    items:
      $ref: "https://schemas.electricity.works/types/single.machine.state/000"

  TypeName:
    const: "snapshot.spaceheat"

  Version:
    const: "003"

required:
  - FromGNodeAlias
  - FromGNodeInstanceId
  - SnapshotTimeUnixMs
  - LatestReadingList
  - LatestStateList
  - TypeName
  - Version

additionalProperties: false

