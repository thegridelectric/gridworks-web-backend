$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.electricity.works/types/synced.readings.bundle/002"

title: "synced.readings.bundle"
type: object
description: >
  Time-aligned sequence of synchronized multi-channel readings with embedded
  channel semantics sufficient for independent interpretation.

  For each channel, values in its associated ValueList are ordered to align
  by index with TimestampList, such that the value at index i corresponds
  to TimestampList[i].

  ChannelDefinitions provides the measurement unit required to interpret
  values for each channel.

properties:

  AboutGNodeAlias:
    $ref: "https://schemas.electricity.works/formats/left.right.dot"

  StartTimestamp:
    $ref: "https://schemas.electricity.works/formats/utc.iso8601.seconds"

  EndTimestamp:
    $ref: "https://schemas.electricity.works/formats/utc.iso8601.seconds"

  TimestampList:
    type: array
    items:
      $ref: "https://schemas.electricity.works/formats/utc.iso8601.seconds"

  ChannelReadingsList:
    type: array
    items:
      $ref: "https://schemas.electricity.works/types/channel.readings.list.item/000"

  LatePersistenceList:
    type: array
    items:
      array:
      items:
        $ref: "https://schemas.electricity.works/formats/utc.iso8601.seconds"

  OperatingStateSequenceList:
    type: array
    items:
      $ref: "https://schemas.electricity.works/types/operating.state.sequence/000"


  TypeName:
    const: "synced.readings.bundle"

  Version:
    const: "002"

required:
  - AboutGNodeAlias
  - StartTimestamp
  - EndTimestamp
  - TimestampList
  - ChannelReadingsList
  - TypeName
  - Version

additionalProperties: false


examples:
  - |
    {
      "AboutGNodeAlias": "dw1.isone.me.versant.keene.apple.ta",
      "StartTimestamp": "2025-02-26T00:00:00Z",
      "EndTimestamp": "2025-02-26T00:02:00Z",
      "TimestampList": [
        "2025-02-26T00:00:00Z",
        "2025-02-26T00:01:00Z",
        "2025-02-26T00:02:00Z"
      ],
      "ChannelReadingsList": [
        {
          "ChannelName": "buffer-depth1",
          "ValueList": [4973, 4966, 4979],
          "Unit": "FahrenheitX100",
          "UnitType": "gw1.unit",
          "TypeName": "channel.readings.list.item",
          "Version": "000"
        },
        {
          "ChannelName": "hp-ewt",
          "ValueList": [18234, 18179, 18157],
          "Unit": "WaterTempCTimes1000",
          "UnitType": "spaceheat.telemetry.name",
          "TypeName": "channel.readings.list.item",
          "Version": "000"
        },
        {
          "ChannelName": "hp-idu-pwr",
          "ValueList": [14, 14, 14],
          "Unit": "Watts",
          "UnitType": "gw1.unit",
          "TypeName": "channel.readings.list.item",
          "Version": "000"
        },
        {
          "ChannelName": "persistence-delay",
          "ValueList": [231, 102, 3650238],
          "Unit": "Milliseconds",
          "UnitType": "gw1.unit",
          "TypeName": "channel.readings.list.item",
          "Version": "000"
        }
      ],
      "TypeName": "synced.readings.bundle",
      "Version": "002"
    }

x-gridworks:
  owner: "gridworks-energy"

  axioms:

    - number: 1
      name: "TerminalAssetAliasConstraint"
      statement: >
        AboutGNodeAlias SHALL identify a TerminalAsset and therefore
        SHALL end with the suffix ".ta".

    - number: 2
      name: "ChannelDefinitionBijection"
      statement: >
        ChannelName values SHALL be unique across ChannelReadingsList.

    - number: 3
      name: "StartTimestampBeforeEnd"
      statement: >
        StartTimestamp shall be less than EndTimestamp

    - number: 4
      name: "TimestampAndValueLengthAlignment"
      statement: >
        The length of TimestampList shall be equal to the length of ValueList for each entry in ChannelReadingsList.

    - number: 5
      name: "UnitTypeAndValueRepresentationConsistency"
      statement: >
        For each entry in ChannelDefinitions:

          - UnitType SHALL equal one of:
              gw1.unit
              spaceheat.telemetry.name

          - Unit SHALL be a valid value from the specified UnitType version:

            gw1.unit → version 001
            spaceheat.telemetry.name → version 007



  extended_description: >

    `synced.readings.bundle` represents a rectangular, time-aligned dataset
    across multiple channels.

    ChannelName values are identifiers defined within a GridWorks SCADA layout
    context (e.g. layout.lite or gw.nolan.layout). They are not globally
    standardized vocabulary and SHALL be interpreted only within the context
    in which they were produced.

    ChannelDefinitions provides a minimal projection of channel semantics,
    including `Name`, `Id`, `Unit` and `UnitType`, sufficient to interpret the
    numeric values in this bundle without requiring access to the full layout.

    The `Id` together with the channel TypeName (e.g. `data.channel.gt`,
    `derived.channel.gt`, or `analytics.channel.gt`) enables resolution of the
    authoritative channel definition. This bundle is not a source of semantic
    authority; it provides a convenient projection for transport, indexing,
    and querying.
