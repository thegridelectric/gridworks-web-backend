$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.electricity.works/enums/gw1.main.auto.state/001"

title: "gw1.main.auto.state"
type: "string"
description: >
  Top-level state of a GridWorks spaceheat system.

enum:
  - "LocalControl"
  - "LeafTransactiveNode"
  - "Dormant"

default: "LocalControl"

x-gridworks:
  owner: "gridworks-energy"
  version: "001"
  value_descriptions:
    "LocalControl": "The system is controlling the spaceheat based on its own internal logic."
    "LeafTransactiveNode": "The system is controlling the spaceheat based on instructions from its online LeafTransactiveNode."
    "Dormant": "The system is not controlling the spaceheat."
  extended_description: >
    
